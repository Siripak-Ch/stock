      window.CES_BUILD_HASH = '20260720-stock-reference-style-function-v3';









      // On-demand library loader for rarely-used heavy libs




      window.CES_loadLib = function(url) {




        return new Promise(function(resolve, reject) {




          if (document.querySelector('script[src="' + url + '"]')) { resolve(); return; }




          var s = document.createElement('script');




          s.src = url; s.onload = resolve; s.onerror = reject;




          document.head.appendChild(s);




        });




      };




      window.CES_LIBS = {




        tesseract: 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js',

      };









      // Hide splash when app is ready




      window.CES_hideSplash = function() {




        var splash = document.getElementById('ces-splash');




        if (splash) { splash.style.opacity='0'; splash.style.transition='opacity 0.3s'; setTimeout(function(){splash.style.display='none';},300); }
