<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CES KPI API Test</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a;margin:0;padding:28px}
    .card{max-width:920px;margin:auto;background:#fff;border:1px solid #e5e7eb;border-radius:22px;padding:24px;box-shadow:0 20px 50px rgba(15,23,42,.08)}
    button{border:0;border-radius:12px;background:#4f46e5;color:white;font-weight:800;padding:12px 16px;cursor:pointer;margin:4px}
    pre{background:#0f172a;color:#e2e8f0;border-radius:16px;padding:16px;overflow:auto;min-height:320px;font-size:12px;line-height:1.45}
  </style>
</head>
<body>
  <div class="card">
    <h1>CES KPI API Test</h1>
    <p>ทดสอบเฉพาะ KPI Tracking → Apps Script API</p>
    <button onclick="testKpi()">Test getKPIDashboardData('EHS')</button>
    <button onclick="testRaw()">Test Raw</button>
    <pre id="out">Ready...</pre>
  </div>

  <script src="js/config.js"></script>
  <script src="js/gas-polyfill.js"></script>
  <script>
    const out = document.getElementById('out');
    function show(title, data){ out.textContent = title + '\n\n' + JSON.stringify(data, null, 2); }
    async function testKpi(){
      out.textContent = 'Testing KPI...';
      try {
        const res = await CES_API.callFunction('getKPIDashboardData', ['EHS']);
        show('✅ KPI OK', {
          success: res && res.success,
          count: res && res.data ? res.data.length : 0,
          summary: res && res.summary,
          sample: res && res.data ? res.data.slice(0, 3) : []
        });
      } catch(e){ show('❌ KPI FAIL', e); }
    }
    async function testRaw(){
      out.textContent = 'Testing KPI raw...';
      try {
        const res = await CES_API.raw('getKPIDashboardData', ['EHS']);
        show('RAW', res);
      } catch(e){ show('RAW FAIL', e); }
    }
  </script>
</body>
</html>
