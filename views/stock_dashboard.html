<section class="hidden stockpro-page" id="view-stock_dashboard">
<div class="stockpro-shell">
<div class="stockpro-header-card">
<div class="stockpro-title-wrap">
<div class="stockpro-icon ces-view-icon"><i class="fas fa-chart-pie"></i></div>
<div>
<h1>Stock Dashboard</h1>
<p>CES Inventory Overview</p>
</div>
</div>
<div class="stockpro-actions">
<button class="sp-btn ghost sd-icon-only" onclick="initStockDashboardModule(true)" title="Refresh / Resync"><i class="fas fa-sync-alt"></i></button>
<button class="sp-btn warn sd-icon-only" onclick="sd_openAlertPopup()" title="Alerts"><i class="fas fa-bell"></i><span class="sp-mini-badge" id="sdAlertHeaderCount">0</span></button>
<button class="sp-btn dark sd-icon-only" onclick="sd_exportSummary()" title="Export Summary"><i class="fas fa-file-excel"></i></button>
</div>
</div>
<div class="stockpro-model-grid" id="sdModelCards"></div>
<div class="stockpro-filter-card">
<div class="sp-search">
<i class="fas fa-search"></i>
<input id="sdSearch" oninput="sd_renderFiltered()" placeholder="ค้นหา ID, SN, ผู้ยืม, สถานที่..."/>
</div>
<select id="sdBrand" onchange="sd_renderFiltered()"><option value="all">แบรนด์ทั้งหมด</option></select>
<select id="sdModel" onchange="sd_renderFiltered()"><option value="all">โมเดลทั้งหมด</option></select>
<select id="sdStatus" onchange="sd_renderFiltered()"><option value="all">สถานะทั้งหมด</option></select>
</div>
<div class="stockpro-kpi-grid" id="sdKpiGrid"></div>
<div class="stockpro-two-col">
<div class="stockpro-card">
<h3><i class="fas fa-chart-pie text-indigo-500"></i> สัดส่วนสถานะอุปกรณ์</h3>
<div class="stockpro-chart-box"><canvas id="sdStatusChart"></canvas></div>
</div>
<div class="stockpro-card">
<h3><i class="fas fa-chart-bar text-[#003DA5]"></i> อุปกรณ์ถูกยืมรายเดือน</h3>
<div class="stockpro-chart-box"><canvas id="sdRentalChart"></canvas></div>
</div>
</div>
<div class="stockpro-card">
<div class="stockpro-card-head">
<h3><i class="fas fa-file-contract text-blue-500"></i> รายการสัญญา / Rental Contract Summary</h3>
<span class="sp-pill" id="sdContractCount">0 locations</span>
</div>
<div class="stockpro-filter-card sp-contract-filter-card" style="grid-template-columns:1fr 1fr auto;margin-bottom:12px;box-shadow:none;">
<select id="sdContractFilter" onchange="sd_renderContractSummary()">
<option value="all">ทุกสัญญา</option>
<option value="overdue">หมดสัญญา / Overdue</option>
<option value="active">กำลังใช้งาน</option>
<option value="completed">เรียบร้อยแล้ว / Completed</option>
</select>
<select id="sdContractSort" onchange="sd_renderContractSummary()">
<option value="risk">Sort: Risk first</option>
<option value="location">Sort: Location A-Z</option>
<option value="due_asc">Sort: Due date ↑</option>
<option value="due_desc">Sort: Due date ↓</option>
</select>
<button class="sp-btn ghost" onclick="sd_v11ResetContractFilter()"><i class="fas fa-rotate-left"></i> Reset Filter</button>
</div>
<div id="sdContractTable"></div>
</div>
<div class="stockpro-two-col">
<div class="stockpro-card">
<h3><i class="fas fa-layer-group text-blue-500"></i> Summary by Model / Brand / Status</h3>
<div id="sdSummaryTable"></div>
</div>
<div class="stockpro-card">
<h3><i class="fas fa-map-marker-alt text-[#003DA5]"></i> Summary by Location</h3>
<div id="sdLocationTable"></div>
</div>
</div>
<div class="stockpro-card" style="display:none">
<div class="stockpro-card-head">
<h3><i class="fas fa-bell text-[#5B7F95]"></i> Alert List</h3>
<span class="sp-pill" id="sdAlertCount">0 alerts</span>
</div>
<div id="sdAlertTable"></div>
</div>
</div>
</section>
